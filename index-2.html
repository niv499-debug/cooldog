    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC_EwME-PqxT1HhGGdJeNHpc9gs85pNNXg",
            authDomain: "cooldog-c8687.firebaseapp.com",
            projectId: "cooldog-c8687",
            storageBucket: "cooldog-c8687.firebasestorage.app",
            messagingSenderId: "695782232191",
            appId: "1:695782232191:web:e72ae86db3f1206950af4a",
            measurementId: "G-2Z6GHYLM7D"
        };

        const firebaseApp = initializeApp(firebaseConfig);
        const db = getFirestore(firebaseApp);
        const auth = getAuth(firebaseApp);

        // Make Firebase functions available globally
        window._db = db;
        window._auth = auth;
        window._fbDoc = doc;
        window._fbSetDoc = setDoc;
        window._fbGetDoc = getDoc;

        // תיקון: שמור unsubscribe כדי לבטל את ה-listener בעת התנתקות
        let _unsubscribeSnapshot = null;

        window._fbSignOut = async () => {
            if (_unsubscribeSnapshot) {
                _unsubscribeSnapshot();
                _unsubscribeSnapshot = null;
            }
            await signOut(auth);
        };

        // טעינת נתונים מהענן — Firebase הוא source of truth, localStorage הוא write cache בלבד
        async function loadAndRender() {
            // נקה localStorage ישן — Firebase גובר תמיד
            localStorage.removeItem('cooldog-v8');
            try {
                const docRef = doc(db, 'cooldog', 'main');
                const snap = await getDoc(docRef);
                if (snap.exists()) {
                    // החלף state לחלוטין מהענן — לא merge עם ברירות מחדל
                    app.state = {
                        ...app.state,       // שמור שדות UI-only (view, filter, currentMonth וכו')
                        ...snap.data()      // Firebase גובר על הכל
                    };
                    console.log('✅ נטען מהענן');
                } else {
                    console.log('📦 אין נתונים בענן - מתחיל ריק');
                }
            } catch (e) {
                console.warn('⚠️ שגיאת Firebase:', e);
            }
            app.render();
            document.body.classList.add('dark');

            // תיקון: רשום listener אחד בלבד ושמור unsubscribe
            if (!_unsubscribeSnapshot) {
                const docRef = doc(db, 'cooldog', 'main');
                _unsubscribeSnapshot = onSnapshot(docRef, (snap) => {
                    if (snap.exists() && !window._savingToFirebase) {
                        app.state = { ...app.state, ...snap.data() };
                        app.render();
                    }
                });
            }
        }

        window.addEventListener('load', () => {
            document.addEventListener('click', (e) => {
                if (e.target.classList.contains('modal')) {
                    e.target.style.display = 'none';
                }
            });

            // תיקון: onAuthStateChanged מופעל רק פעם אחת — בכניסה ראשונה
            let initialized = false;
            onAuthStateChanged(auth, (user) => {
                if (user && !initialized) {
                    initialized = true;
                    document.getElementById('login-screen').style.display = 'none';
                    document.getElementById('app-root').style.display = 'block';
                    loadAndRender();
                } else if (!user) {
                    initialized = false;
                    document.getElementById('login-screen').style.display = 'flex';
                    document.getElementById('app-root').style.display = 'none';
                }
            });
        });

        window.doGoogleLogin = async () => {
            const err = document.getElementById('login-error');
            err.textContent = '';
            try {
                const provider = new GoogleAuthProvider();
                await signInWithPopup(auth, provider);
            } catch (e) {
                err.style.color = '#e31e24';
                err.textContent = 'הכניסה עם Google נכשלה';
            }
        };
    </script>

        <div class="card p-8 w-full max-w-md space-y-6">
            <h3 class="font-bold text-xl text-gray-800">עריכת תוכן</h3>
            <textarea id="edit-textarea" class="input-style w-full p-4 h-48 resize-none"></textarea>
            <div class="flex gap-4">
                <button onclick="app.closeEdit()" class="flex-1 py-4 bg-gray-100 text-gray-500 font-bold rounded-2xl">ביטול</button>
                <button id="save-edit-btn" class="flex-1 py-4 bg-red-600 text-white font-bold rounded-2xl shadow-lg">שמור</button>
            </div>
        </div>
    </div>

    <!-- Settings Modal -->
    <div id="settings-modal" class="modal">
        <div class="card p-8 w-full max-w-md space-y-6">
            <h3 class="font-bold text-xl text-gray-800">⚙️ הגדרות</h3>
            <div class="space-y-2">
                <label class="text-xs font-bold text-gray-500 uppercase">יעד חודשי (₪)</label>
                <input type="number" id="goal-input" value="15000" class="input-style w-full p-4">
            </div>
            <div class="space-y-3">
                <button onclick="app.exportData()" class="w-full py-3 bg-blue-600 text-white font-bold rounded-xl">📥 ייצוא</button>
                <button onclick="document.getElementById('import-file').click()" class="w-full py-3 bg-green-600 text-white font-bold rounded-xl">📤 ייבוא</button>
            </div>
            <div class="flex gap-4">
                <button onclick="app.closeSettings()" class="flex-1 py-4 bg-gray-100 text-gray-500 font-bold rounded-2xl">סגור</button>
                <button onclick="app.saveSettings()" class="flex-1 py-4 bg-red-600 text-white font-bold rounded-2xl">שמור</button>
            </div>
        </div>
    </div>

    <!-- Appointment Modal -->
    <div id="apt-modal" class="modal">
        <div class="card p-8 w-full max-w-md space-y-6">
            <h3 class="font-bold text-xl text-gray-800">📅 תור חדש</h3>
            <div class="autocomplete-wrap">
                <input type="text" id="apt-client" placeholder="שם לקוח" class="input-style w-full p-4" autocomplete="off"
                    oninput="app.filterClients('apt-client','apt-client-dd')"
                    onfocus="app.filterClients('apt-client','apt-client-dd')"
                    onblur="setTimeout(()=>app.closeDropdown('apt-client-dd'),200)">
                <div id="apt-client-dd" class="autocomplete-dropdown"></div>
            </div>
            <div class="grid grid-cols-2 gap-4">
                <input type="date" id="apt-date" class="input-style w-full p-4">
                <input type="time" id="apt-time" value="10:00" class="input-style w-full p-4">
            </div>
            <select id="apt-type" class="input-style w-full p-4">
                <option>אילוף פרטי</option>
                <option>כלבנות טיפולית</option>
                <option>שיעור קבוצתי</option>
                <option>פנסיון אילוף</option>
            </select>
            <div class="flex gap-4">
                <button onclick="app.closeAptModal()" class="flex-1 py-4 bg-gray-100 text-gray-500 font-bold rounded-2xl">ביטול</button>
                <button onclick="app.saveApt()" class="flex-1 py-4 bg-red-600 text-white font-bold rounded-2xl">שמור</button>
            </div>
        </div>
    </div>

    <!-- Client Modal -->
    <div id="client-modal" class="modal" onclick="if(event.target===this)app.closeClientModal()">
        <div class="card p-6 w-full max-w-lg" style="max-height:92vh;overflow-y:auto;">
            <div class="flex justify-between items-center mb-6">
                <h3 class="font-black text-xl" id="client-modal-title">➕ לקוח חדש</h3>
                <button onclick="app.closeClientModal()" class="w-9 h-9 bg-gray-100 rounded-full text-gray-400 hover:text-gray-700 font-bold text-xl flex items-center justify-center">×</button>
            </div>
            <div class="space-y-4">
                <div>
                    <label class="text-xs font-bold text-gray-400 uppercase block mb-1">שם מלא *</label>
                    <input type="text" id="cm-name" placeholder="שם הלקוח" class="input-style w-full p-4">
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="text-xs font-bold text-gray-400 uppercase block mb-1">טלפון</label>
                        <input type="tel" id="cm-phone" placeholder="050-0000000" class="input-style w-full p-4">
                    </div>
                    <div>
                        <label class="text-xs font-bold text-gray-400 uppercase block mb-1">כתובת</label>
                        <input type="text" id="cm-address" placeholder="עיר / שכונה" class="input-style w-full p-4">
                    </div>
                </div>
                <!-- כלב 1 -->
                <div class="border border-gray-100 rounded-2xl p-4 space-y-3 bg-gray-50">
                    <div class="flex justify-between items-center">
                        <p class="text-xs font-black text-gray-500 uppercase">🐕 כלב 1</p>
                        <div class="flex items-center gap-2">
                            <label class="text-xs font-bold text-gray-400">מספר כלבים:</label>
                            <input type="number" id="cm-dogs" value="1" min="1" max="5" class="input-style w-16 p-2 text-center text-sm font-bold" oninput="app.updateDogFields()">
                        </div>
                    </div>
                    <div class="grid grid-cols-2 gap-3">
                        <div>
                            <label class="text-xs font-bold text-gray-400 uppercase block mb-1">שם הכלב</label>
                            <input type="text" id="cm-dogname" placeholder="שם הכלב" class="input-style w-full p-3">
                        </div>
                        <div>
                            <label class="text-xs font-bold text-gray-400 uppercase block mb-1">גזע</label>
                            <input type="text" id="cm-breed" placeholder="גזע" class="input-style w-full p-3">
                        </div>
                    </div>
                    <div>
                        <label class="text-xs font-bold text-gray-400 uppercase block mb-1">תאריך לידה</label>
                        <input type="date" id="cm-dogdob" class="input-style w-full p-3">
                    </div>
                </div>
                <!-- כלב 2+ דינמי -->
                <div id="cm-extra-dogs"></div>
                <div>
                    <label class="text-xs font-bold text-gray-400 uppercase block mb-1">סוג שירות</label>
                    <select id="cm-service" class="input-style w-full p-4">
                        <option>אילוף פרטי</option>
                        <option>כלבנות טיפולית</option>
                        <option>פריזבי</option>
                        <option>שיעורים קבוצתיים</option>
                        <option>פנסיון אילוף</option>
                        <option value="ספק">💼 ספק (חשבונית חודשית)</option>
                    </select>
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="text-xs font-bold text-gray-400 uppercase block mb-1">מחיר לשיעור (₪)</label>
                        <input type="number" id="cm-price" placeholder="0" class="input-style w-full p-4">
                    </div>
                    <div>
                        <label class="text-xs font-bold text-gray-400 uppercase block mb-1">תאריך התחלה</label>
                        <input type="date" id="cm-startdate" class="input-style w-full p-4">
                    </div>
                </div>
                <div>
                    <label class="text-xs font-bold text-gray-400 uppercase block mb-1">הערות</label>
                    <textarea id="cm-notes" placeholder="אלרגיות, מידע חשוב, תנאים מיוחדים..." class="input-style w-full p-4 h-20 resize-none"></textarea>
                </div>
                <div>
                    <label class="text-xs font-bold text-gray-400 uppercase block mb-1">🕐 שיעור אחרון (עקיפה ידנית)</label>
                    <input type="date" id="cm-lastlesson" class="input-style w-full p-4">
                    <p class="text-xs text-gray-400 mt-1">ישמש במקום התאריך שמחושב אוטומטי מהיומן</p>
                </div>
            </div>
            <div class="flex gap-3 mt-6">
                <button onclick="app.closeClientModal()" class="flex-1 py-4 bg-gray-100 text-gray-500 font-bold rounded-2xl">ביטול</button>
                <button onclick="app.saveClientModal()" class="flex-1 py-4 bg-red-600 text-white font-bold rounded-2xl shadow-lg">שמור</button>
            </div>
        </div>
    </div>

    <input type="file" id="import-file" accept=".json" style="display:none" onchange="app.importData(event)">

    <!-- Receipt Modal -->
    <div id="receipt-modal" class="modal" onclick="if(event.target===this)this.style.display='none'">
        <div class="card p-6 w-full max-w-md" style="max-height:92vh;overflow-y:auto;">
            <div class="flex justify-between items-center mb-5">
                <h3 class="font-black text-xl">🧾 קבלה דיגיטלית</h3>
                <button onclick="document.getElementById('receipt-modal').style.display='none'" class="w-9 h-9 bg-gray-100 rounded-full font-bold text-gray-400 text-xl flex items-center justify-center">×</button>
            </div>
            <div id="receipt-preview" class="bg-gray-50 rounded-2xl p-5 mb-5 space-y-3 text-sm"></div>
            <!-- Unified session picker for all clients -->
            <div id="session-picker" class="mb-4">
                <label class="text-xs font-bold text-gray-400 uppercase block mb-2">בחר שיעור</label>
                <select id="receipt-session" class="input-style w-full p-3" onchange="app.previewSessionReceipt()"></select>
            </div>
            <div class="flex gap-3">
                <button onclick="document.getElementById('receipt-modal').style.display='none'" class="flex-1 py-3 bg-gray-100 text-gray-500 font-bold rounded-2xl">סגור</button>
                <button onclick="app.downloadReceipt()" class="flex-1 py-3 bg-red-600 text-white font-bold rounded-2xl">📄 הורד PDF</button>
            </div>
        </div>
    </div>

    <script>
        const app = {
            state: {
                clients: [],
                missions: [],
                vault: [],
                appointments: [],
                dogs: {
                    'קולין': { breed: 'בורדר קולי (FCI)', dob: '2021-04-19', notes: ['מאולף מאוד', 'מתחרה פריזבי לשעבר'], trainingLog: [] },
                    'Zippo': { breed: 'בורדר קולי', dob: '2025-06-27', notes: ['מתאמן לפריזבי תחרותי'], trainingLog: [] },
                    'מומו': { breed: 'צ\'יוואווה (של רוני)', dob: '2021-04-01', notes: ['שובבה', 'אוהבת לגנוב אוכל'], trainingLog: [] }
                },
                view: 'dashboard',
                filter: 'all',
                goal: 15000,
                darkMode: true,
                dismissedNotifs: [],
                currentMonth: new Date().getMonth(),
                currentYear: new Date().getFullYear()
            },
            charts: {},
            rendering: false,

            _saveTimer: null,

            save: () => {
                // localStorage הוא write cache בלבד — Firebase הוא source of truth
                // (לא נקרא בטעינה — רק Firebase נקרא ב-loadAndRender)
                localStorage.setItem('cooldog-v8', JSON.stringify(app.state));
                // debounce — שמירה לענן רק שנייה אחרי הפעולה האחרונה
                clearTimeout(app._saveTimer);
                app._saveTimer = setTimeout(() => {
                    if (!window._db || !window._fbDoc || !window._fbSetDoc) return;
                    const { view, filter, clientFilter, currentMonth, currentYear, darkMode, ...cloudState } = app.state;
                    window._savingToFirebase = true;
                    // safety: אם setDoc תקוע מעל 10 שניות — שחרר את הדגל בכל מקרה
                    const _saveGuard = setTimeout(() => { window._savingToFirebase = false; }, 10000);
                    const docRef = window._fbDoc(window._db, 'cooldog', 'main');
                    window._fbSetDoc(docRef, JSON.parse(JSON.stringify(cloudState)))
                        .then(() => { clearTimeout(_saveGuard); window._savingToFirebase = false; })
                        .catch(e => {
                            clearTimeout(_saveGuard);
                            window._savingToFirebase = false;
                            console.warn('שגיאה בשמירה לענן:', e);
                        });
                }, 1000);
            },

            nav: (v) => {
                app.state.view = v;
                app.render();
            },

            toast: (msg, ok) => {
                const t = document.createElement('div');
                t.className = 'error-toast';
                if (ok) {
                    t.style.background = '#e8f5e9';
                    t.style.borderColor = '#c8e6c9';
                    t.style.color = '#2e7d32';
                }
                t.textContent = msg;
                document.body.appendChild(t);
                setTimeout(() => t.remove(), 3000);
            },

            esc: (t) => {
                const d = document.createElement('div');
                d.textContent = t;
                return d.innerHTML;
            },

            calculateAge: (dob) => {
                const birth = new Date(dob);
                const now = new Date();
                if (isNaN(birth)) return '?';
                if (birth > now) return 'טרם נולד';

                const totalDays = Math.floor((now - birth) / (1000*60*60*24));
                if (totalDays === 0) return 'נולד היום! 🎉';
                if (totalDays < 30) return `${totalDays} ימים`;

                let years = now.getFullYear() - birth.getFullYear();
                let months = now.getMonth() - birth.getMonth();
                if (now.getDate() < birth.getDate()) months--;
                if (months < 0) { years--; months += 12; }

                if (years === 0) return `${months} חודשים`;
                if (months === 0) return `${years} ${years === 1 ? 'שנה' : 'שנים'}`;
                return `${years} ${years === 1 ? 'שנה' : 'שנים'} ו-${months} חודשים`;
            },

            render: () => {
                if (app.rendering) return; // Prevent multiple renders at once
                app.rendering = true;
                try {
                    const v = document.getElementById('view');
                    const views = ['dashboard', 'calendar', 'clients', 'ops', 'vault', 'units', 'stats'];
                    document.querySelectorAll('.nav-item').forEach((el, i) => {
                        el.classList.toggle('nav-active', views[i] === app.state.view);
                    });

                    // Update badge
                    const today = new Date().toISOString().split('T')[0];
                    const todayApts = app.state.appointments.filter(a => a.date === today);
                    const badge = document.getElementById('cal-badge');
                    if (todayApts.length > 0) {
                        badge.textContent = todayApts.length;
                        badge.style.display = 'block';
                    } else {
                        badge.style.display = 'none';
                    }

                    switch(app.state.view) {
                        case 'dashboard': app.renderDashboard(v); break;
                        case 'calendar': app.renderCalendar(v); break;
                        case 'clients': app.renderClients(v); break;
                        case 'ops': app.renderOps(v); break;
                        case 'vault': app.renderVault(v); break;
                        case 'units': app.renderUnits(v); break;
                        case 'stats': app.renderStats(v); break;
                    }

                    app.updateNotifBadge();
                } catch (err) {
                    console.error('שגיאת render:', err);
                } finally {
                    app.rendering = false;
                }
            },

            renderDashboard: (v) => {
                const now = new Date();
                const thisMonth = `${now.getMonth() + 1}/${now.getFullYear()}`;
                
                const monthVault = app.state.vault.filter(x => {
                    const d = new Date(x.date);
                    return `${d.getMonth() + 1}/${d.getFullYear()}` === thisMonth;
                });
                
                const income = monthVault.reduce((a, x) => a + (x.amount > 0 ? x.amount : 0), 0);
                const expenses = monthVault.reduce((a, x) => a + (x.amount < 0 ? Math.abs(x.amount) : 0), 0);
                const profit = income - expenses;
                const progress = (income / app.state.goal) * 100;

                const monthMissions = app.state.missions.filter(m => {
                    const p = m.date.split('.');
                    if (p.length < 3) return false;
                    const yr = parseInt(p[2]); const fullYr = yr < 100 ? yr + 2000 : yr;
                    return parseInt(p[1]) === (now.getMonth() + 1) && fullYr === now.getFullYear();
                });

                const activeClients = new Set(monthMissions.map(m => m.client)).size;

                v.innerHTML = `
                    <div class="space-y-6">
                        <div>
                            <h1 class="text-3xl font-black">שלום, ${window._auth?.currentUser?.displayName?.split(' ')[0] || 'ניב'}! 👋</h1>
                            <p class="text-gray-500 mt-1">${now.toLocaleDateString('he-IL', {weekday: 'long', day: 'numeric', month: 'long'})}</p>

            updateDogFields: () => {
                const count = parseInt(document.getElementById('cm-dogs').value) || 1;
                // Read current extra dogs values before rebuilding
                const currentExtra = [];
                for (let i = 2; i <= 10; i++) {
                    const nameEl = document.getElementById(`cm-dog${i}-name`);
                    if (!nameEl) break;
                    currentExtra.push({
                        name: nameEl.value || '',
                        breed: document.getElementById(`cm-dog${i}-breed`)?.value || '',
                        dob: document.getElementById(`cm-dog${i}-dob`)?.value || ''
                    });
                }
                // Pad or trim to count-1 extras
                const needed = count - 1;
                while (currentExtra.length < needed) currentExtra.push({ name:'', breed:'', dob:'' });
                app._buildExtraDogs(currentExtra.slice(0, needed));

            _htmlToPDF: (htmlContent, filename) => {
                return new Promise((resolve) => {
                    const { jsPDF } = window.jspdf;
                    if (!jsPDF) {
                        app.toast('שגיאה: jsPDF לא נטען');
                        resolve();
                        return;
                    }

                    // Open in new window - guaranteed to work cross-browser
                    const win = window.open('', '_blank', 'width=900,height=700');
                    if (!win) {
                        app.toast('אפשר חלונות קופצים בדפדפן');
                        resolve();
                        return;
                    }

                    win.document.write('<!DOCTYPE html><html dir="rtl"><head><meta charset="UTF-8">'
                        + '<link href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;600;700;800;900&family=Fredoka:wght@700&display=swap" rel="stylesheet">'
                        + '<style>body{margin:0;padding:0;background:#fdfaf5;}</style>'
                        + '</head><body>' + htmlContent + '</body></html>');
                    win.document.close();

                    // Wait for fonts to load then capture
                    win.onload = () => {
                        setTimeout(() => {
                            html2canvas(win.document.body, {
                                scale: 2,
                                useCORS: true,
                                backgroundColor: '#fdfaf5',
                                logging: false,
                                windowWidth: 874,
                            }).then(canvas => {
                                win.close();
                                const imgData = canvas.toDataURL('image/jpeg', 0.92);
                                const pdf = new jsPDF({ orientation: 'p', unit: 'mm', format: 'a4' });
                                const pageW = 210, pageH = 297;
                                const imgW = pageW;
                                const imgH = (canvas.height * imgW) / canvas.width;
                                const totalPages = Math.ceil(imgH / pageH);
                                for (let i = 0; i < totalPages; i++) {
                                    if (i > 0) pdf.addPage();
                                    pdf.addImage(imgData, 'JPEG', 0, -(i * pageH), imgW, imgH);
                                }
                                pdf.save(filename);
                                app.toast('✅ PDF יוצא בהצלחה!', true);
                                resolve();
                            }).catch(err => {
                                win.close();
                                console.error('html2canvas error:', err);
                                app.toast('שגיאה בצילום הדף');
                                resolve();
                            });
                        }, 800);
                    };
                });
            },

            // ── CLIENT STATUS (auto: inactive after 60 days) ──
            clientStatus: (c) => {
                const parseAnyDate = s => {
                    if (!s) return null;
                    s = String(s).trim();
                    if (/^\d{4}-\d{2}-\d{2}/.test(s)) { const d = new Date(s); return isNaN(d) ? null : d; }
                    const p = s.split('.');
                    if (p.length === 3) {
                        const day = parseInt(p[0]), mon = parseInt(p[1]);
                        const year = p[2].length === 4 ? parseInt(p[2]) : parseInt(p[2]) + 2000;
                        const d = new Date(year, mon - 1, day);
                        return isNaN(d) ? null : d;
                    }
                    const d = new Date(s); return isNaN(d) ? null : d;
                };
                if (c.manualLastSession) {
                    const d = parseAnyDate(c.manualLastSession);
                    if (d) { const diff = (new Date() - d) / (1000*60*60*24); return diff > 60 ? 'inactive' : 'active'; }
                }
                const allMissions = app.state.missions.filter(m => m.client === c.name);
                if (allMissions.length === 0) return 'new';
                const missions = allMissions.map(m => ({ _ts: parseAnyDate(m.date) })).filter(m => m._ts).sort((a, b) => a._ts - b._ts);
                if (missions.length === 0) return 'active';
                const diffDays = (new Date() - missions[missions.length - 1]._ts) / (1000 * 60 * 60 * 24);
                return diffDays > 60 ? 'inactive' : 'active';
            },

            setClientFilter: (f) => {
                app.state.clientFilter = f;
                app.render();
            },

            goToClient: (clientId) => {

                app.state.view = 'clients';
                app.state._highlightClientId = clientId;
                app.render();

                const tryScroll = (attempts) => {
                    const el = document.querySelector(`[data-client-id="${clientId}"]`);
                    if (el) {
                        el.scrollIntoView({ behavior: 'smooth', block: 'center' });
                        el.style.transition = 'box-shadow 0.4s';
                        el.style.boxShadow = '0 0 0 3px rgba(227,30,36,0.5)';

                };
                setTimeout(() => tryScroll(10), 50);

            globalSearch: (q) => {
                const box = document.getElementById('search-results');
                if (!box) return;
                if (!q || q.trim().length < 1) { box.style.display = 'none'; return; }
                const term = q.trim().toLowerCase();

                const highlight = (text) => {
                    if (!text) return '';
                    const safe = app.esc(text);
                    const idx = safe.toLowerCase().indexOf(term);
                    if (idx === -1) return safe;
                    return safe.substring(0, idx) +
                        `<mark style="background:#fef08a;border-radius:3px;padding:0 2px;">${safe.substring(idx, idx + term.length)}</mark>` +
                        safe.substring(idx + term.length);
                };

                const close = `document.getElementById('global-search').value='';document.getElementById('search-results').style.display='none';`;

                const sections = [];

                // לקוחות
                const clientResults = [];
                app.state.clients.forEach(c => {
                    const allDogNames = (c.dogs || []).map(d => d.name).join(' ');
                    const allDogBreeds = (c.dogs || []).map(d => d.breed).join(' ');
                    const score = [c.name, c.phone, c.dogName, c.breed, c.address, allDogNames, allDogBreeds].join(' ').toLowerCase();
                    if (score.includes(term)) {
                        const dogLabels = (c.dogs && c.dogs.length > 0)
                            ? c.dogs.filter(d => d.name).map(d => '🐕 ' + d.name).join(' · ')
                            : (c.dogName ? '🐕 ' + c.dogName : '');
                        clientResults.push({ icon: '👤', label: highlight(c.name), sub: [dogLabels, c.phone || ''].filter(Boolean).join(' · '), action: `app.goToClient('${c.id}')` });
                    }
                });
                if (clientResults.length) sections.push({ title: '👤 לקוחות', items: clientResults });

                // תורים
                const aptResults = [];
                app.state.appointments.forEach(a => {
                    if ((a.client + ' ' + a.type).toLowerCase().includes(term)) {
                        const d = new Date(a.date);
                        aptResults.push({ icon: '📅', label: highlight(a.client), sub: d.toLocaleDateString('he-IL') + ' ' + a.time + ' · ' + a.type, action: `${close}app.nav('calendar')` });
                    }
                });
                if (aptResults.length) sections.push({ title: '📅 תורים', items: aptResults });

                // שיעורים
                const missionResults = [];
                app.state.missions.forEach(m => {
                    if ((m.client + ' ' + m.report).toLowerCase().includes(term)) {
                        missionResults.push({ icon: '📝', label: highlight(m.client), sub: m.date + (m.payment ? ' · ₪' + m.payment : '') + ' · ' + m.report.substring(0, 40), action: `${close}app.nav('ops')` });

                        const [mon] = k.split('/');
                        return `<div style="flex:1;min-width:0;display:flex;flex-direction:column;align-items:center;gap:3px;">
                            <div style="font-size:10px;font-weight:700;color:#e31e24;height:14px;">${v>1?v:''}</div>
                            <div style="width:70%;background:#e31e24;border-radius:3px 3px 0 0;height:${4+Math.round(pct*0.36)}px;"></div>
                            <div style="font-size:10px;color:#999;">${mnL[parseInt(mon)]}</div>
                        </div>`;
                    }).join('');
                    timelineHtml = `
                        <div style="margin-bottom:20px;">
                            <div style="font-size:14px;font-weight:900;color:#1a1a1a;margin-bottom:10px;padding-right:10px;border-right:4px solid #e31e24;">פעילות לפי חודש</div>
                            <div style="background:#fff;border:1px solid #f0e8e8;border-radius:12px;padding:14px 14px 10px;">
                                <div style="display:flex;align-items:flex-end;gap:3px;height:56px;">${bars}</div>
                            </div>
                        </div>`;
                }

                // ── Session rows ──
                const sessionRows = sessions.slice().reverse().map(m => {
                    const paid   = m.isPaid !== false;
                    const hasAmt = m.payment;
                    const statusBg   = !hasAmt ? '' : paid ? '#d1fae5' : '#fee2e2';
                    const statusTxt  = !hasAmt ? '' : paid ? '#065f46' : '#991b1b';
                    const statusStr  = !hasAmt ? '' : paid ? 'שולם' : 'לא שולם';
                    const amtColor   = !hasAmt ? '' : paid ? '#059669' : '#dc2626';
                    const typeStr    = (m.type && m.type !== 'שיעור') ? m.type : 'שיעור';
                    const summary    = m.report ? (m.report.length>90 ? m.report.substring(0,90)+'...' : m.report) : '—';
                    return `<tr>
                        <td style="white-space:nowrap;color:#6b7280;font-size:12px;">${m.date}</td>
                        <td><span style="background:#dbeafe;color:#1e40af;border-radius:5px;padding:1px 7px;font-size:11px;font-weight:700;">${typeStr}</span></td>
                        <td style="font-size:12px;color:#374151;">${summary}</td>
                        <td style="font-weight:800;color:${amtColor||'#9ca3af'};white-space:nowrap;">${hasAmt?'&#x20AA;'+Number(m.payment).toLocaleString():'—'}</td>
                        <td>${statusStr?`<span style="background:${statusBg};color:${statusTxt};border-radius:5px;padding:1px 7px;font-size:11px;font-weight:700;">${statusStr}</span>`:''}</td>
                    </tr>`;
                }).join('');

                const sinceStr = c.startDate
                    ? new Date(c.startDate).toLocaleDateString('he-IL')
                    : (sessions.length > 0 ? sessions[0].date : '—');

                const html = `<!DOCTYPE html><html dir="rtl"><head><meta charset="UTF-8">
                <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;600;700;800;900&family=Fredoka:wght@700&display=swap" rel="stylesheet">
                <style>
                *{box-sizing:border-box;margin:0;padding:0;}
                body{font-family:'Assistant',sans-serif;direction:rtl;background:#fdfaf5;color:#1a1a1a;padding:32px;}
                .header{background:linear-gradient(135deg,#1a1a1a 0%,#2d2d2d 100%);color:white;padding:28px 32px;border-radius:16px;margin-bottom:22px;display:flex;justify-content:space-between;align-items:flex-start;}
                .header-right{display:flex;align-items:center;gap:16px;}
                .avatar{width:60px;height:60px;min-width:60px;border-radius:50%;background:linear-gradient(135deg,#e31e24,#ff6b6b);color:white;font-weight:900;font-size:26px;display:flex;align-items:center;justify-content:center;border:3px solid rgba(255,255,255,0.2);}
                .header-left{text-align:left;flex-shrink:0;}
                .kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px;}
                .kpi{background:white;border:1px solid #f0e8e8;border-radius:12px;padding:16px 18px;}
                .kpi .lbl{font-size:11px;font-weight:700;color:#9ca3af;text-transform:uppercase;letter-spacing:.04em;margin-bottom:6px;}
                .kpi .val{font-size:20px;font-weight:900;}
                .section-title{font-size:15px;font-weight:900;color:#1a1a1a;margin:18px 0 10px;padding-right:10px;border-right:4px solid #e31e24;}
                table{width:100%;border-collapse:collapse;font-size:13px;}
                thead tr{background:#e31e24;}
                thead th{padding:9px 12px;font-weight:700;color:white;text-align:right;}
                tbody tr:nth-child(odd){background:#fdf5f5;}
                tbody tr:nth-child(even){background:#fff;}
                tbody td{padding:8px 12px;border-bottom:1px solid #f5eded;}
                .total-row td{background:#1a1a1a!important;color:white;font-weight:900;padding:10px 12px;}
                .footer{text-align:center;margin-top:24px;padding-top:14px;border-top:2px solid #e31e24;font-size:11px;color:#aaa;}
                </style></head><body>

                <div class="header">
                    <div class="header-right">
                        <div class="avatar">${c.name.charAt(0)}</div>
                        <div>
                            <div style="font-size:24px;font-weight:900;font-family:'Fredoka',sans-serif;line-height:1.1;">${c.name}</div>
                            <div style="font-size:12px;opacity:0.7;margin-top:5px;">${[c.serviceType||'אילוף פרטי', c.phone, c.address].filter(Boolean).join(' · ')}</div>
                            ${dogTags ? `<div style="margin-top:8px;">${dogTags}</div>` : ''}
                        </div>
                    </div>
                    <div class="header-left">
                        <div style="font-size:18px;font-weight:900;font-family:'Fredoka',sans-serif;">CoolDog</div>
                        <div style="font-size:11px;opacity:0.55;margin-top:3px;">תיק לקוח · ${now.toLocaleDateString('he-IL')}</div>
                        <div style="margin-top:10px;background:${statusColor};color:white;border-radius:8px;padding:4px 14px;font-size:12px;font-weight:700;text-align:center;">${statusLabel}</div>
                    </div>
                </div>

                <div class="kpi-row">
                    <div class="kpi"><div class="lbl">שיעורים</div><div class="val" style="color:#3b82f6;">${sessions.length}</div></div>
                    <div class="kpi"><div class="lbl">סה"כ שולם</div><div class="val" style="color:#10b981;">&#x20AA;${totalPaid.toLocaleString()}</div></div>
                    <div class="kpi"><div class="lbl">ממוצע לשיעור</div><div class="val">&#x20AA;${avgPayment.toLocaleString()}</div></div>
                    <div class="kpi"><div class="lbl">${totalDebt>0?'חוב פתוח':'לקוח מאז'}</div><div class="val" style="${totalDebt>0?'color:#e31e24;':''}">${totalDebt>0?'&#x20AA;'+totalDebt.toLocaleString():sinceStr}</div></div>
                </div>

                ${c.notes ? `<div style="background:#fef3c7;border-right:4px solid #f59e0b;border-radius:10px;padding:11px 14px;margin-bottom:18px;font-size:13px;color:#92400e;"><strong>הערות: </strong>${c.notes}</div>` : ''}

                ${timelineHtml}

                ${sessions.length > 0 ? `
                <div class="section-title">היסטוריית שיעורים (${sessions.length})</div>
                <table>
                    <thead><tr><th>תאריך</th><th>סוג</th><th>סיכום</th><th>תשלום</th><th>סטטוס</th></tr></thead>
                    <tbody>${sessionRows}</tbody>
                    <tr class="total-row">
                        <td colspan="3">סה"כ</td>
                        <td>&#x20AA;${totalCharged.toLocaleString()}</td>
                        <td>${totalDebt>0?'חוב: &#x20AA;'+totalDebt.toLocaleString():'✓ מסולק'}</td>
                    </tr>
                </table>` : '<p style="text-align:center;color:#aaa;padding:32px 0;">אין שיעורים רשומים</p>'}

                <div class="footer">CoolDog &nbsp;|&nbsp; תיק לקוח: ${c.name} &nbsp;|&nbsp; הופק ב-${now.toLocaleDateString('he-IL')}</div>
                </body></html>`;

                await app._htmlToPDF(html, `\u05ea\u05d9\u05e7-\u05dc\u05e7\u05d5\u05d7-${c.name}-${now.toISOString().split('T')[0]}.pdf`);
            },

            exportMonthlyPDF: async () => {
                const sel = document.getElementById('pdf-month');
                if (!sel) return;
                const [m, y] = sel.value.split('/').map(Number);
                const monthNames = ['ינואר','פברואר','מרץ','אפריל','מאי','יוני','יולי','אוגוסט','ספטמבר','אוקטובר','נובמבר','דצמבר'];
                const now = new Date();

                const monthVault = app.state.vault.filter(x => {
                    const d = new Date(x.date);
                    return d.getMonth() + 1 === m && d.getFullYear() === y;
                });
                const income = monthVault.filter(x => x.amount > 0).reduce((s, x) => s + x.amount, 0);
                const expenses = monthVault.filter(x => x.amount < 0).reduce((s, x) => s + Math.abs(x.amount), 0);
                const net = income - expenses;

                const monthMissions = app.state.missions.filter(ms => {
                    const p = ms.date.split('.');
                    if (p.length < 3) return false;
                    const yr2 = parseInt(p[2]); const fullYr2 = yr2 < 100 ? yr2 + 2000 : yr2;
                    return parseInt(p[1]) === m && fullYr2 === y;
                });
                const activeClients = new Set(monthMissions.map(ms => ms.client)).size;

                const sessionRows = monthMissions.map((ms, i) => `
                    <tr>
                        <td>${ms.date}</td>
                        <td><strong>${ms.client}</strong></td>
                        <td>${ms.report ? ms.report.substring(0, 60) + (ms.report.length > 60 ? '...' : '') : '-'}</td>
                        <td class="green">${ms.payment ? '₪' + ms.payment : '-'}</td>
                    </tr>`).join('');

                const txRows = monthVault.slice().reverse().map(x => {
                    const isInc = x.amount > 0;
                    return `<tr>
                        <td>${new Date(x.date).toLocaleDateString('he-IL')}</td>
                        <td>${x.desc || (isInc ? 'הכנסה' : 'הוצאה')}</td>
                        <td class="${isInc ? 'green' : 'red'}">${isInc ? '+' : '-'}₪${Math.abs(x.amount).toLocaleString()}</td>
                    </tr>`;
                }).join('');

                const html = app._pdfCSS() + `
                    <div class="pdf-header">
                        <h1>CoolDog</h1>
                        <p>דוח חודשי &nbsp;|&nbsp; ${monthNames[m-1]} ${y}</p>
                    </div>
                    <div class="kpi-grid">
                        <div class="kpi" style="background:#10b981"><div class="val">₪${income.toLocaleString()}</div><div class="lbl">הכנסות</div></div>
                        <div class="kpi" style="background:#e31e24"><div class="val">₪${expenses.toLocaleString()}</div><div class="lbl">הוצאות</div></div>
                        <div class="kpi" style="background:${net>=0?'#059669':'#b91c1c'}"><div class="val">₪${net.toLocaleString()}</div><div class="lbl">רווח נקי</div></div>
                        <div class="kpi" style="background:#3b82f6"><div class="val">${monthMissions.length}</div><div class="lbl">שיעורים</div></div>
                        <div class="kpi" style="background:#8b5cf6"><div class="val">${activeClients}</div><div class="lbl">לקוחות פעילים</div></div>
                        <div class="kpi" style="background:#f59e0b"><div class="val">₪${monthMissions.length > 0 ? Math.round(income/monthMissions.length).toLocaleString() : 0}</div><div class="lbl">ממוצע לשיעור</div></div>
                    </div>
                    ${monthMissions.length > 0 ? `
                    <div class="section-title">שיעורים החודש</div>
                    <table>
                        <thead><tr><th>תאריך</th><th>לקוח</th><th>סיכום</th><th>תשלום</th></tr></thead>
                        <tbody>${sessionRows}</tbody>
                    </table>` : ''}
                    ${monthVault.length > 0 ? `
                    <div class="section-title">תנועות כספיות</div>
                    <table>
                        <thead><tr><th>תאריך</th><th>תיאור</th><th>סכום</th></tr></thead>
                        <tbody>${txRows}</tbody>
                    </table>` : ''}
                    <div class="pdf-footer">CoolDog &nbsp;|&nbsp; ${monthNames[m-1]} ${y} &nbsp;|&nbsp; הופק ב-${now.toLocaleDateString('he-IL')}</div>
                `;

                await app._htmlToPDF(html, `CoolDog-${monthNames[m-1]}-${y}.pdf`);
            },

            exportAnnualPDF: async () => {
                const sel = document.getElementById('pdf-year');
                if (!sel) return;
                const year = parseInt(sel.value);
                const monthNames = ['ינואר','פברואר','מרץ','אפריל','מאי','יוני','יולי','אוגוסט','ספטמבר','אוקטובר','נובמבר','דצמבר'];
                const monthShort = ['ינו','פבר','מרץ','אפר','מאי','יונ','יול','אוג','ספט','אוק','נוב','דצמ'];
                const now = new Date();

                const yearVault = app.state.vault.filter(x => new Date(x.date).getFullYear() === year);
                const yearIncome = yearVault.filter(x => x.amount > 0).reduce((s, x) => s + x.amount, 0);
                const yearExpenses = yearVault.filter(x => x.amount < 0).reduce((s, x) => s + Math.abs(x.amount), 0);
                const yearNet = yearIncome - yearExpenses;

                const yearMissions = app.state.missions.filter(ms => {
                    const p = ms.date.split('.');
                    if (p.length < 3) return false;
                    const yr3 = parseInt(p[2]); const fullYr3 = yr3 < 100 ? yr3 + 2000 : yr3;
                    return fullYr3 === year;
                });
                const activeClientsSet = new Set(yearMissions.map(m => m.client));
                const avgPerSession = yearMissions.length > 0 ? Math.round(yearIncome / yearMissions.length) : 0;

                // Monthly breakdown
                const monthRows = monthShort.map((mLabel, mi) => {
                    const mVault = yearVault.filter(x => new Date(x.date).getMonth() === mi);
                    const mInc = mVault.filter(x => x.amount > 0).reduce((s, x) => s + x.amount, 0);
                    const mExp = mVault.filter(x => x.amount < 0).reduce((s, x) => s + Math.abs(x.amount), 0);
                    const mNet = mInc - mExp;
                    const mMs = yearMissions.filter(ms => parseInt(ms.date.split('.')[1]) === mi + 1);
                    const mClients = new Set(mMs.map(m => m.client)).size;
                    const isCurrent = mi === now.getMonth() && year === now.getFullYear();
                    return `<tr ${isCurrent ? 'style="font-weight:900;background:#fff8f8 !important"' : ''}>
                        <td>${isCurrent ? `<span class="month-badge">${mLabel}</span>` : mLabel}</td>
                        <td class="${mInc>0?'green':''}">${mInc > 0 ? '₪' + mInc.toLocaleString() : '-'}</td>
                        <td class="${mExp>0?'red':''}">${mExp > 0 ? '₪' + mExp.toLocaleString() : '-'}</td>
                        <td class="${mNet>0?'green':mNet<0?'red':''}">${mNet !== 0 ? (mNet>0?'+':'') + '₪' + mNet.toLocaleString() : '-'}</td>
                        <td style="text-align:center">${mMs.length || '-'}</td>
                        <td style="text-align:center">${mClients || '-'}</td>
                    </tr>`;
                }).join('');

                // Top clients
                const clientStats = app.state.clients.map(c => {
                    const s = yearMissions.filter(m => m.client === c.name);
                    const rev = s.reduce((a, m) => a + (parseFloat(m.payment) || 0), 0);
                    return { name: c.name, dogName: c.dogName || '', serviceType: c.serviceType || '', sessions: s.length, revenue: rev };
                }).filter(c => c.sessions > 0).sort((a, b) => b.revenue - a.revenue).slice(0, 15);

                const clientRows = clientStats.map((c, i) => `
                    <tr>
                        <td>${i < 3 ? ['🥇','🥈','🥉'][i] : i + 1}</td>
                        <td><strong>${c.name}</strong></td>
                        <td>${c.dogName || '-'}</td>
                        <td>${c.serviceType || '-'}</td>
                        <td style="text-align:center">${c.sessions}</td>
                        <td class="green">₪${c.revenue.toLocaleString()}</td>
                    </tr>`).join('');

                const html = app._pdfCSS() + `
                    <div class="pdf-header">
                        <h1>CoolDog</h1>
                        <p>דוח שנתי &nbsp;|&nbsp; ${year}</p>
                    </div>
                    <div class="kpi-grid">
                        <div class="kpi" style="background:#10b981"><div class="val">₪${yearIncome.toLocaleString()}</div><div class="lbl">סה"כ הכנסות</div></div>
                        <div class="kpi" style="background:#e31e24"><div class="val">₪${yearExpenses.toLocaleString()}</div><div class="lbl">סה"כ הוצאות</div></div>
                        <div class="kpi" style="background:${yearNet>=0?'#059669':'#b91c1c'}"><div class="val">₪${yearNet.toLocaleString()}</div><div class="lbl">רווח נקי</div></div>
                        <div class="kpi" style="background:#3b82f6"><div class="val">${yearMissions.length}</div><div class="lbl">שיעורים</div></div>
                        <div class="kpi" style="background:#8b5cf6"><div class="val">${activeClientsSet.size}</div><div class="lbl">לקוחות פעילים</div></div>
                        <div class="kpi" style="background:#f59e0b"><div class="val">₪${avgPerSession.toLocaleString()}</div><div class="lbl">ממוצע לשיעור</div></div>
                    </div>
                    <div class="section-title">פירוט חודשי</div>
                    <table>
                        <thead><tr><th>חודש</th><th>הכנסות</th><th>הוצאות</th><th>רווח</th><th>שיעורים</th><th>לקוחות</th></tr></thead>
                        <tbody>
                            ${monthRows}
                            <tr class="total-row">
                                <td>סה"כ</td>
                                <td>₪${yearIncome.toLocaleString()}</td>
                                <td>₪${yearExpenses.toLocaleString()}</td>
                                <td>₪${yearNet.toLocaleString()}</td>
                                <td style="text-align:center">${yearMissions.length}</td>
                                <td style="text-align:center">${activeClientsSet.size}</td>
                            </tr>
                        </tbody>
                    </table>
                    ${clientStats.length > 0 ? `
                    <div class="section-title">לקוחות מובילים ${year}</div>
                    <table>
                        <thead><tr><th>#</th><th>שם</th><th>כלב</th><th>שירות</th><th>שיעורים</th><th>הכנסות</th></tr></thead>
                        <tbody>${clientRows}</tbody>
                    </table>` : ''}
                    <div class="pdf-footer">CoolDog Business Management &nbsp;|&nbsp; דוח שנתי ${year} &nbsp;|&nbsp; הופק ב-${now.toLocaleDateString('he-IL')}</div>
                `;

                await app._htmlToPDF(html, `CoolDog-שנתי-${year}.pdf`);
            }

        };

        // הרינדור מופעל ע"י Firebase module לאחר טעינת הנתונים
        // window.onload נמצא בתוך ה-module script למעלה
    </script>

    </div><!-- /app-root -->
</body>
</html>
